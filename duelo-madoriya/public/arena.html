<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; overflow: hidden; background: #07070d; height: 100%; }
    /* fundo: o mapa escolhido pelo GM, borrado e com pouca opacidade */
    #bg {
      position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover;
      opacity: 0; filter: blur(6px); transition: opacity .4s ease;
      pointer-events: none;
    }
    #vignette {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 55%, #000a 100%);
    }
    #game { position: fixed; inset: 0; }

    #topbar {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 18px; color: #fff;
      font-family: system-ui, sans-serif; text-shadow: 0 2px 8px #000;
      background: #0008; padding: 8px 18px; border-radius: 999px;
      border: 1px solid #ffffff22;
    }
    #timer { font-size: 30px; font-weight: 800; font-variant-numeric: tabular-nums; }
    #round { font-size: 13px; opacity: .8; }
    .fname { font-size: 14px; font-weight: 700; }

    #hud {
      position: fixed; bottom: 10px; left: 12px; color: #cfcfe0;
      font-family: system-ui, sans-serif; font-size: 12px; text-shadow: 0 0 4px #000;
    }
    #overlay {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; background: #000b; color: #fff;
      font-family: system-ui, sans-serif; text-align: center; z-index: 10;
    }
    #overlay .big { font-size: 52px; font-weight: 800; }
    #overlay .sub { font-size: 16px; opacity: .8; }
  </style>
</head>
<body>
  <img id="bg" />
  <div id="vignette"></div>
  <canvas id="game"></canvas>

  <div id="topbar">
    <span class="fname" id="nameL">—</span>
    <span id="timer">--:--</span>
    <span class="fname" id="nameR">—</span>
  </div>
  <div id="round" style="position:fixed;top:54px;left:50%;transform:translateX(-50%);
       color:#fff;font-family:system-ui,sans-serif;text-shadow:0 0 6px #000;"></div>

  <div id="hud"></div>
  <div id="overlay">
    <div class="big" id="ovBig"></div>
    <div class="sub" id="ovSub"></div>
  </div>

  <script type="module" src="./game.js"></script>
</body>
</html>
